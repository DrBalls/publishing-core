name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg (required by qc tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv + install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Run tests
        # Skip the 4 real-video integration tests in CI (no san-diego mp4 available)
        run: .venv/bin/pytest -v --deselect tests/test_qc.py::test_real_video_duration_passes
                                  --deselect tests/test_qc.py::test_real_video_first_frame_passes
                                  --deselect tests/test_qc.py::test_real_video_audio_passes
                                  --deselect tests/test_qc.py::test_real_video_run_all_passes
